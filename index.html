<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Wine Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a0a0a 0%, #2d1515 50%, #1a0a1a 100%);
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px; font-family: Georgia, serif; color: #f5e6d3;
  }
  header { text-align: center; margin-bottom: 20px; }
  header .icon { font-size: 36px; }
  header h1 { font-size: 26px; font-weight: bold; color: #e8c99a; margin: 4px 0 0; letter-spacing: 1px; }
  header p { color: #c4956a; margin: 4px 0 0; font-size: 13px; }

  #chat-area {
    width: 100%; max-width: 680px;
    background: rgba(255,255,255,0.05);
    border-radius: 16px; border: 1px solid rgba(232,201,154,0.15);
    padding: 20px; min-height: 300px; max-height: 420px;
    overflow-y: auto; margin-bottom: 16px;
  }
  .empty-state { text-align: center; color: #8a6a4a; padding-top: 50px; }
  .empty-state .big { font-size: 28px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  .msg { margin-bottom: 14px; display: flex; }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }
  .bubble {
    max-width: 80%; padding: 10px 14px; font-size: 13px; line-height: 1.6;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #7b2d2d, #a03a3a);
    color: #ffe8d6; border-radius: 16px 16px 4px 16px;
  }
  .msg.assistant .bubble {
    background: rgba(255,255,255,0.05); color: #f5e6d3;
    border: 1px solid rgba(232,201,154,0.15);
    border-radius: 16px 16px 16px 4px;
  }
  .bubble .label { font-size: 11px; color: #c4956a; display: block; margin-bottom: 4px; }
  .bubble .replay-btn {
    display: inline-block; margin-top: 6px; background: none; border: none;
    color: #c4956a; cursor: pointer; font-size: 11px; padding: 0; font-family: Georgia, serif;
  }

  .dots { display: flex; gap: 6px; padding: 10px 14px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: #c4956a;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

  #suggestions {
    width: 100%; max-width: 680px;
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }
  .sug-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(232,201,154,0.15);
    border-radius: 20px; padding: 6px 14px; color: #c4956a;
    font-size: 12px; cursor: pointer; font-family: Georgia, serif;
  }
  .sug-btn:hover { background: rgba(232,201,154,0.12); }

  #input-area {
    width: 100%; max-width: 680px;
    display: flex; gap: 10px; align-items: center;
  }
  #query-input {
    flex: 1; padding: 12px 18px; border-radius: 30px;
    border: 1px solid rgba(232,201,154,0.3);
    background: rgba(255,255,255,0.06); color: #f5e6d3;
    font-size: 13px; outline: none; font-family: Georgia, serif;
  }
  #query-input::placeholder { color: #8a6a4a; }
  #send-btn {
    padding: 12px 18px; border-radius: 30px; border: none;
    background: linear-gradient(135deg, #7b2d2d, #a03a3a);
    color: #ffe8d6; cursor: pointer; font-size: 13px;
    font-weight: bold; font-family: Georgia, serif;
  }
  #send-btn:disabled { background: #555; cursor: not-allowed; }
  #mic-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #6b2d6b, #8e44ad);
    color: white; cursor: pointer; font-size: 18px;
    transition: box-shadow 0.2s;
  }
  #mic-btn.active {
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    box-shadow: 0 0 0 4px rgba(231,76,60,0.3);
  }
  #stop-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #2d6b2d, #27ae60);
    color: white; cursor: pointer; font-size: 18px; display: none;
  }
</style>
</head>
<body>

<header>
  <div class="icon">🍷</div>
  <h1>Voice Wine Explorer</h1>
  <p id="subtitle">Loading wines...</p>
</header>

<div id="chat-area">
  <div class="empty-state" id="empty-state">
    <div class="big">🍾</div>
    <p>Ask me anything about our wine collection.</p>
  </div>
</div>

<div id="suggestions">
  <button class="sug-btn" onclick="ask('Best-rated wines under $50?')">Best-rated wines under $50?</button>
  <button class="sug-btn" onclick="ask('Wines from Burgundy?')">Wines from Burgundy?</button>
  <button class="sug-btn" onclick="ask('Most expensive bottle?')">Most expensive bottle?</button>
  <button class="sug-btn" onclick="ask('Good housewarming gift wine?')">Good housewarming gift wine?</button>
  <button class="sug-btn" onclick="ask('Pinot Noir recommendations?')">Pinot Noir recommendations?</button>
</div>

<div id="input-area">
  <input id="query-input" type="text" placeholder="Ask about wines..." onkeydown="if(event.key==='Enter') ask(this.value)" />
  <button id="send-btn" onclick="ask(document.getElementById('query-input').value)">Send</button>
  <button id="mic-btn" onclick="toggleMic()">🎤</button>
  <button id="stop-btn" onclick="stopSpeaking()">🔇</button>
</div>

// Parse wines
const lines = WINES_CSV.trim().split('\n');
const headers = lines[0].split(',');
const wines = lines.slice(1).map(line => {
  const vals = line.split(',');
  const obj = {};
  headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
  return obj;
}).filter(w => w.Name && w.Retail);

document.getElementById('subtitle').textContent = `${wines.length} wines · Ask by voice or text`;

// Build wine context for Claude
const wineContext = wines.map(w =>
  `${w.Name} | ${w.Producer} | ${w.Vintage || 'NV'} | ${w.color} | ${w.Varietal || 'N/A'} | ${w.Region}, ${w.Country} | $${w.Retail} | ABV:${w.ABV}%`
).join('\n');

const SYSTEM_PROMPT = `You are a helpful wine sommelier assistant. Answer questions based ONLY on the wine dataset below. Do not invent facts. Be concise and friendly. For recommendations, list up to 5 wines with name, price, and a brief reason. If the question is outside the dataset, say so politely.

WINE DATASET (${wines.length} wines):
${wineContext}`;

// State
let isSpeaking = false;

function scrollBottom() {
  const area = document.getElementById('chat-area');
  area.scrollTop = area.scrollHeight;
}

function addMessage(role, text) {
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  document.getElementById('suggestions').style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant') {
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = '🍷 Sommelier';
    bubble.appendChild(label);
  }

  const textNode = document.createTextNode(text);
  bubble.appendChild(textNode);

  if (role === 'assistant') {
    const btn = document.createElement('button');
    btn.className = 'replay-btn';
    btn.textContent = '🔊 Play again';
    btn.onclick = () => speak(text);
    bubble.appendChild(btn);
  }

  div.appendChild(bubble);
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function showThinking() {
  const div = document.createElement('div');
  div.id = 'thinking';
  div.className = 'dots';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    div.appendChild(d);
  }
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function ask(q) {
  q = q.trim();
  if (!q) return;
  document.getElementById('query-input').value = '';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', q);
  showThinking();

  try {
    const res = await fetch('/api/apichat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const answer = data.content?.[0]?.text || 'Sorry, I could not get a response.';
    hideThinking();
    addMessage('assistant', answer);
    speak(answer);
  } catch (e) {
    hideThinking();
    addMessage('assistant', 'Error connecting to AI. Please check your connection and try again.');
  }

  document.getElementById('send-btn').disabled = false;
}

// Text-to-speech
function speak(text) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 1.05;
  utt.onstart = () => { isSpeaking = true; document.getElementById('stop-btn').style.display = 'block'; };
  utt.onend = () => { isSpeaking = false; document.getElementById('stop-btn').style.display = 'none'; };
  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('stop-btn').style.display = 'none';
}

// Speech recognition
let recognition = null;

function toggleMic() {
  const btn = document.getElementById('mic-btn');
  if (recognition) {
    recognition.stop();
    recognition = null;
    btn.classList.remove('active');
    btn.textContent = '🎤';
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input not supported. Please use Chrome.'); return; }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.onstart = () => { btn.classList.add('active'); btn.textContent = '⏹'; };
  recognition.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('query-input').value = t;
    ask(t);
  };
  recognition.onend = () => { btn.classList.remove('active'); btn.textContent = '🎤'; recognition = null; };
  recognition.onerror = () => { btn.classList.remove('active'); btn.textContent = '🎤'; recognition = null; };
  recognition.start();
}
